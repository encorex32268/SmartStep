[versions]
agp = "8.13.1"
coreKtx = "1.17.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
lifecycleRuntimeKtx = "2.10.0"
activityCompose = "1.12.3"
kotlin = "2.2.21"
composeBom = "2026.01.01"
splash = "1.0.0"
dataStroe = "1.2.0"
navigation = "2.9.5"
permission = "0.37.3"
lifecycleCompose = "2.8.0"
koin = "4.1.1"
room = "2.8.4"
desugar = "2.0.3"
ksp = "2.3.4"
worker = "2.11.1"
serialization = "1.10.0"
timber = "5.0.1"



[libraries]
androidx-core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "coreKtx" }
junit = { group = "junit", name = "junit", version.ref = "junit" }
androidx-junit = { group = "androidx.test.ext", name = "junit", version.ref = "junitVersion" }
androidx-espresso-core = { group = "androidx.test.espresso", name = "espresso-core", version.ref = "espressoCore" }
androidx-lifecycle-runtime-ktx = { group = "androidx.lifecycle", name = "lifecycle-runtime-ktx", version.ref = "lifecycleRuntimeKtx" }
androidx-lifecycle-process = { group = "androidx.lifecycle", name = "lifecycle-process", version.ref = "lifecycleRuntimeKtx"}
androidx-activity-compose = { group = "androidx.activity", name = "activity-compose", version.ref = "activityCompose" }
androidx-compose-bom = { group = "androidx.compose", name = "compose-bom", version.ref = "composeBom" }
androidx-compose-ui = { group = "androidx.compose.ui", name = "ui" }
androidx-compose-ui-graphics = { group = "androidx.compose.ui", name = "ui-graphics" }
androidx-compose-ui-tooling = { group = "androidx.compose.ui", name = "ui-tooling" }
androidx-compose-ui-tooling-preview = { group = "androidx.compose.ui", name = "ui-tooling-preview" }
androidx-compose-ui-test-manifest = { group = "androidx.compose.ui", name = "ui-test-manifest" }
androidx-compose-ui-test-junit4 = { group = "androidx.compose.ui", name = "ui-test-junit4" }
androidx-compose-material3 = { group = "androidx.compose.material3", name = "material3" }

#SplashScreen
splashscreen = { group = "androidx.core" , name = "core-splashscreen" , version.ref = "splash"}

#Datastore
androidx-datastore = { module = "androidx.datastore:datastore" ,version.ref = "dataStroe" }
androidx-datastore-preferences = { module = "androidx.datastore:datastore-preferences" ,version.ref = "dataStroe" }

#Navigation
navigation-compose =  { module = "androidx.navigation:navigation-compose" , version.ref = "navigation"}

#Permission
google-accompanist-permissions = { module = "com.google.accompanist:accompanist-permissions" , version.ref = "permission"}

#ViewModel-Compose
androidx-lifecycle-viewmodel-compose = { group = "androidx.lifecycle", name = "lifecycle-viewmodel-compose", version.ref = "lifecycleCompose" }

#Koin
koin-android = { group = "io.insert-koin", name = "koin-android", version.ref = "koin" }
koin-core = { group = "io.insert-koin", name = "koin-core", version.ref = "koin" }
koin-androidx-compose = { group = "io.insert-koin", name = "koin-androidx-compose", version.ref = "koin" }

#Room
room-runtime = { module = "androidx.room:room-runtime" , version.ref = "room"}
room-compiler = { module = "androidx.room:room-compiler" , version.ref = "room"}
room-ktx = { module = "androidx.room:room-ktx" , version.ref = "room"}

#Desugar JDK
desugar-jdk = { module = "com.android.tools:desugar_jdk_libs" , version.ref = "desugar"}

#Worker
work = { module = "androidx.work:work-runtime-ktx" , version.ref = "worker"}
work-testing = { module = "androidx.work:work-testing" , version.ref = "worker"}

#Serialization
serialization = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json" , version.ref = "serialization"}

#Timber
timer = { module = "com.jakewharton.timber:timber" , version.ref = "timber"}

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization" , version.ref = "kotlin"}
ksp = { id = "com.google.devtools.ksp" , version.ref = "ksp"}

[bundles]
koin = [
    "koin-android",
    "koin-androidx-compose",
    "koin-core"
]

